<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volunteer - Shatakshi NGO</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; background:#111; color:#f5f5f5; overflow-x:hidden; }
    header { background:#000; color:#FFD700; padding:20px; text-align:center; }
    header h1 { margin:0; font-size:2.5em; }
    header p { margin:5px 0 0; }

    nav { background:#222; display:flex; justify-content:center; padding:10px; }
    nav a { color:#FFD700; text-decoration:none; margin:0 15px; font-weight:bold; }
    nav a:hover { text-decoration:underline; }

    main { padding:20px; display:grid; gap:30px; max-width:1000px; margin:auto; }
    section { background:#222; padding:20px; border-radius:12px; box-shadow:0 0 10px rgba(0,0,0,0.6); }
    h2 { color:#FFD700; margin-top:0; }

    .upload-box { background: #333; padding: 20px; border-radius: 10px; max-width: 500px; margin:auto; }
    input, button { margin-top: 10px; width: 100%; padding: 10px; border-radius: 5px; border: none; }
    button { background: #ffd700; color: #000; font-weight: bold; cursor: pointer; }
    button:hover { background: #ffea70; }
    #tokenInput { margin-top: 10px; }
    #preview { margin-top: 15px; max-width: 100%; border-radius: 8px; display: none; }
    #runs { margin-top: 15px; font-size: 14px; }

    #gallery { margin-top: 30px; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
    #gallery img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; border: 2px solid #444; transition: transform 0.2s; cursor: pointer; }
    #gallery img:hover { transform: scale(1.05); }

    footer { background:#000; color:#aaa; text-align:center; padding:15px; margin-top:40px; font-size:14px; }
    footer a { color:#FFD700; text-decoration:none; }
    footer a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <header>
    <h1>Shatakshi NGO</h1>
    <p>“हथियार से कलम तक” - Volunteer Page</p>
  </header>

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="volunteer.html">Volunteer</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
  </nav>

  <main>
    <section>
      <h2>Upload Image to Gallery</h2>
      <div class="upload-box">
        <input type="file" id="fileInput" accept="image/*">
        <input type="password" id="tokenInput" placeholder="Enter your GitHub PAT">
        <button onclick="uploadImage()">Upload</button>
        <p id="status"></p>
        <img id="preview" alt="Image preview" />
        <div id="runs"></div>
      </div>
    </section>

    <section>
      <h2>Gallery</h2>
      <div id="gallery"></div>
    </section>
  </main>

  <footer>
    <p>&copy; 2025 Shatakshi NGO | <a href="privacy.html">Privacy Policy</a> | <a href="terms.html">Terms of Use</a></p>
  </footer>

  <script>
    async function uploadImage() {
      const fileInput = document.getElementById('fileInput');
      const tokenInput = document.getElementById('tokenInput');
      const status = document.getElementById('status');
      const preview = document.getElementById('preview');

      if (!fileInput.files.length) {
        status.textContent = "Please select a file.";
        return;
      }
      if (!tokenInput.value) {
        status.textContent = "Please enter your GitHub PAT.";
        return;
      }

      const file = fileInput.files[0];
      const reader = new FileReader();
      reader.onload = async function() {
        const base64Content = reader.result.split(',')[1];

        // Show preview immediately
        preview.src = reader.result;
        preview.style.display = 'block';

        status.textContent = "Upload request sent!";

        try {
          // Check if file already exists to supply SHA for update
          let sha = null;
          const checkRes = await fetch(`https://api.github.com/repos/jaiswalabhinaw/casestudy/contents/gallery/${encodeURIComponent(file.name)}`);
          if (checkRes.ok) {
            const checkData = await checkRes.json();
            if (checkData.sha) sha = checkData.sha;
          }

          if (sha) {
            const confirmReplace = confirm(`${file.name} already exists in the gallery. Do you want to replace it?`);
            if (!confirmReplace) {
              status.textContent = "❌ Upload cancelled by user.";
              return;
            }
          }

          const response = await fetch(`https://api.github.com/repos/jaiswalabhinaw/casestudy/contents/gallery/${encodeURIComponent(file.name)}`, {
            method: "PUT",
            headers: {
              "Accept": "application/vnd.github+json",
              "Authorization": `Bearer ${tokenInput.value}`,
              "Content-Type": "application/json; charset=utf-8"
            },
            body: JSON.stringify({
              message: sha ? `Update ${file.name} in gallery` : `Add ${file.name} to gallery`,
              content: base64Content,
              sha: sha
            })
          });

          if (response.ok) {
            status.textContent = `✅ Image uploaded successfully! Refreshing gallery...`;
            setTimeout(loadGallery, 1500);
          } else {
            let errorMsg = "";
            try { errorMsg = await response.json(); } catch { errorMsg = await response.text(); }
            status.textContent = "❌ Upload failed: " + response.status + " - " + JSON.stringify(errorMsg);
          }
        } catch (err) {
          status.textContent = "⚠️ Error: " + err.message;
        }
      };

      reader.readAsDataURL(file);
    }

    async function loadGallery() {
      const galleryDiv = document.getElementById('gallery');
      galleryDiv.innerHTML = "";
      try {
        const res = await fetch("https://api.github.com/repos/jaiswalabhinaw/casestudy/contents/gallery");
        const data = await res.json();
        if (Array.isArray(data)) {
          data.forEach(file => {
            if (file.download_url) {
              const link = document.createElement('a');
              link.href = file.download_url;
              link.target = "_blank";

              const img = document.createElement('img');
              img.src = file.download_url;
              link.appendChild(img);

              galleryDiv.appendChild(link);
            }
          });
        } else {
          galleryDiv.innerHTML = "⚠️ Could not load gallery: " + JSON.stringify(data);
        }
      } catch (e) {
        galleryDiv.innerHTML = "⚠️ Could not load gallery: " + e.message;
      }
    }

    loadGallery();
    setInterval(loadGallery, 30000);
  </script>
</body>
</html>
