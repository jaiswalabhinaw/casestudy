<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery - Sataakshi NGO</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; background:#111; color:#f5f5f5; overflow-x:hidden; }

    header { background:#000; color:#FFD700; padding:1em; position:sticky; top:0; z-index:1000; display:flex; align-items:center; justify-content:space-between; }
    .logo { font-weight:bold; font-size:1.2em; text-decoration:none; color:#FFD700; margin-right:1em; }
    .menu-toggle { font-size:1.5em; cursor:pointer; color:#FFD700; margin-left:1em; }

    /* Sidebar */
    .sidebar { height:100%; width:0; position:fixed; top:0; right:0; background:#222; overflow-x:hidden; transition:0.5s; padding-top:60px; z-index:1000; }
    .sidebar a { display:block; padding:12px 20px; text-decoration:none; color:#FFD700; opacity:0; transform:translateX(50px); }
    .sidebar a.show { opacity:1; transform:translateX(0); transition: all 0.5s ease; }
    .sidebar a:hover { background:#333; padding-left:30px; color:#fff; }
    .sidebar .closebtn { position:absolute; top:10px; left:15px; font-size:2em; text-decoration:none; color:#FFD700; }

    main { max-width: 1000px; margin: 2em auto; padding: 1.5em; background: #1a1a1a; color: #f5f5f5; border-radius: 8px; }
    main h1 { text-align: center; color: #FFD700; margin-bottom: 1em; }

    .gallery { display:grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap:1em; }
    .gallery-item { background:#222; border-radius:6px; box-shadow:0 0 10px rgba(0,0,0,0.5); overflow:hidden; display:flex; align-items:center; justify-content:center; min-height:180px; color:#888; font-size:1em; }
    .gallery-item img { width:100%; height:100%; object-fit:cover; display:block; }

    footer { background:#000; color:#FFD700; text-align:center; padding:1em; margin-top:2em; }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="logo">Sataakshi</a>
  <span class="menu-toggle" onclick="openNav()">☰</span>
</header>

<div id="mySidebar" class="sidebar">
  <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
  <a href="about.html">About</a>
  <a href="causes.html">Causes</a>
  <a href="projects.html">Projects</a>
  <a href="events.html">Events</a>
  <a href="gallery.html">Gallery</a>
  <a href="volunteer.html">Volunteer</a>
  <a href="donate.html">Donate</a>
  <a href="contact.html">Contact</a>
  <a href="blog.html">Blog</a>
  <a href="founder.html">Founder</a>
  <a href="creator.html">Creator</a>
</div>

<main>
  <h1>📰 गैलरी - समाचार पत्र कटिंग्स</h1>

  <div class="gallery">
    <div class="gallery-item">Gallery Item 1 (Add Newspaper Cutting)</div>
    <div class="gallery-item">Gallery Item 2</div>
    <div class="gallery-item">Gallery Item 3</div>
    <div class="gallery-item">Gallery Item 4</div>
    <div class="gallery-item">Gallery Item 5</div>
    <div class="gallery-item">Gallery Item 6</div>
  </div>

</main>

<footer>
  <p>© 2025 Shatakshi NGO. All rights reserved.</p>
</footer>

<script>
function openNav() {
  const sidebar = document.getElementById("mySidebar");
  sidebar.style.width = "250px";
  const links = sidebar.querySelectorAll("a");
  links.forEach((link, i) => {
    setTimeout(() => link.classList.add("show"), i * 120);
  });
}
function closeNav() {
  const sidebar = document.getElementById("mySidebar");
  sidebar.style.width = "0";
  const links = sidebar.querySelectorAll("a");
  links.forEach(link => link.classList.remove("show"));
}
</script>

</body>
</html>
