<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CASESTUDY | Turning Case Studies Into Growth Stories.</title>
  <!-- Load Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap");
    body {
      font-family: "Poppins", sans-serif;
      background-color: #f8fafc;
    }
    .bg-pattern {
      background-image: linear-gradient(to bottom, transparent, #e2e8f0),
        url("data:image/svg+xml;utf8,<svg width='100%' height='100%' xmlns='http://www.w3.org/2000/svg'><pattern id='grid' width='20' height='20' patternUnits='userSpaceOnUse'><path d='M 20 0 L 0 0 0 20' fill='none' stroke='%23cbd5e1' stroke-width='0.5'/></pattern><rect width='100%' height='100%' fill='url(%23grid)' /></svg>");
    }
    .modal {
      background-color: rgba(0, 0, 0, 0.5);
    }
    .video-container {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
    }
    .video-container video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body class="text-slate-800">

  <!-- Firebase & JS -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
    const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let userId = null;

    async function signIn() {
      try {
        if (initialAuthToken) {
          await signInWithCustomToken(auth, initialAuthToken);
        } else {
          await signInAnonymously(auth);
        }
      } catch (error) {
        console.error("Firebase Auth Error:", error);
      }
    }

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        userId = user.uid;
        document.getElementById('user-id-display').textContent = `User ID: ${userId}`;
        initializeVideoListener(db, appId);
      } else {
        document.getElementById('user-id-display').textContent = 'Signed out';
        signIn();
      }
    });

    const videoDocPath = `artifacts/${appId}/public/data/site_content/main_video`;

    function initializeVideoListener(db, appId) {
      const videoPlayer = document.getElementById('site-video-player');
      const videoUrlInput = document.getElementById('video-url-input');

      onSnapshot(doc(db, videoDocPath), (docSnapshot) => {
        if (docSnapshot.exists()) {
          const data = docSnapshot.data();
          if (data && data.url) {
            videoPlayer.src = data.url;
            videoUrlInput.value = data.url;
          }
        } else {
          const defaultUrl = 'https://www.w3schools.com/html/mov_bbb.mp4';
          videoPlayer.src = defaultUrl;
          videoUrlInput.value = defaultUrl;
        }
      });
    }

    async function saveVideoUrl(url) {
      const statusMessage = document.getElementById('status-message');
      try {
        await setDoc(doc(db, videoDocPath), { url: url });
        statusMessage.textContent = "Video URL saved successfully!";
        statusMessage.classList.add('text-green-600');
        statusMessage.classList.remove('text-red-600');
      } catch (error) {
        statusMessage.textContent = `Error saving URL: ${error.message}`;
        statusMessage.classList.add('text-red-600');
        statusMessage.classList.remove('text-green-600');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      // Video Modal
      const updateVideoBtn = document.getElementById('update-video-btn');
      const videoUploaderModal = document.getElementById('video-uploader-modal');
      const closeModalBtn = document.getElementById('close-modal-btn');
      const saveBtn = document.getElementById('save-btn');
      const videoUrlInput = document.getElementById('video-url-input');
      const statusMessage = document.getElementById('status-message');

      if (updateVideoBtn) {
        updateVideoBtn.addEventListener('click', () => {
          videoUploaderModal.classList.remove('hidden');
          statusMessage.textContent = '';
        });
      }
      if (closeModalBtn) {
        closeModalBtn.addEventListener('click', () => {
          videoUploaderModal.classList.add('hidden');
        });
      }
      if (saveBtn) {
        saveBtn.addEventListener('click', () => {
          const url = videoUrlInput.value;
          if (url) {
            saveVideoUrl(url);
          } else {
            statusMessage.textContent = "Please enter a valid video URL.";
            statusMessage.classList.add('text-red-600');
          }
        });
      }

      // ✅ Mobile Menu Toggle (fixed)
      const mobileMenuBtn = document.getElementById('mobile-menu-button');
      const mobileMenu = document.getElementById('mobile-menu');

      if (mobileMenuBtn && mobileMenu) {
        mobileMenuBtn.addEventListener('click', () => {
          mobileMenu.classList.toggle('hidden');
          if (mobileMenu.classList.contains('hidden')) {
            mobileMenuBtn.innerHTML = `
              <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
              </svg>`;
          } else {
            mobileMenuBtn.innerHTML = `
              <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
              </svg>`;
          }
        });
        mobileMenu.querySelectorAll("a").forEach(link => {
          link.addEventListener("click", () => {
            mobileMenu.classList.add("hidden");
            mobileMenuBtn.innerHTML = `
              <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
              </svg>`;
          });
        });
      }

      // Testimonial Slider
      const testimonialContainer = document.getElementById('testimonial-container');
      const prevBtn = document.getElementById('prev-btn');
      const nextBtn = document.getElementById('next-btn');
      const dotsContainer = document.getElementById('testimonial-dots');
      const testimonials = Array.from(testimonialContainer.children);
      const totalTestimonials = testimonials.length;
      let currentIndex = 0;

      function updateSlider(index) {
        testimonialContainer.style.transform = `translateX(-${index * 100}%)`;
        updateDots(index);
      }
      function updateDots(index) {
        Array.from(dotsContainer.children).forEach((dot, i) => {
          dot.classList.toggle('bg-sky-500', i === index);
          dot.classList.toggle('bg-slate-300', i !== index);
        });
      }

      if (prevBtn) {
        prevBtn.addEventListener('click', () => {
          currentIndex = (currentIndex - 1 + totalTestimonials) % totalTestimonials;
          updateSlider(currentIndex);
        });
      }
      if (nextBtn) {
        nextBtn.addEventListener('click', () => {
          currentIndex = (currentIndex + 1) % totalTestimonials;
          updateSlider(currentIndex);
        });
      }
      if (dotsContainer) {
        dotsContainer.addEventListener('click', (e) => {
          if (e.target.classList.contains('dot')) {
            const dotIndex = parseInt(e.target.dataset.index, 10);
            currentIndex = dotIndex;
            updateSlider(currentIndex);
          }
        });
      }

      signIn();
    });
  </script>
