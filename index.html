    <div class="hidden md:flex items-center space-x-6 lg:space-x-12">

<!-- ========== SCRIPT ========== -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
  import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
  import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

  const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
  const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
  const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  let userId = null;

  async function signIn() {
    try {
      if (initialAuthToken) await signInWithCustomToken(auth, initialAuthToken);
      else await signInAnonymously(auth);
    } catch (e) { console.error("Firebase Auth Error:", e); }
  }

  onAuthStateChanged(auth, (user) => {
    if (user) {
      userId = user.uid;
      document.getElementById('user-id-display').textContent = `User ID: ${userId}`;
      initializeVideoListener();
    } else {
      signIn();
    }
  });

  const videoDocPath = `artifacts/${appId}/public/data/site_content/main_video`;
  function initializeVideoListener() {
    const videoPlayer = document.getElementById('site-video-player');
    const videoUrlInput = document.getElementById('video-url-input');
    onSnapshot(doc(db, videoDocPath), (docSnapshot) => {
      if (docSnapshot.exists()) {
        const data = docSnapshot.data();
        if (data && data.url) {
          videoPlayer.src = data.url;
          videoUrlInput.value = data.url;
        }
      } else {
        const defaultUrl = 'https://www.w3schools.com/html/mov_bbb.mp4';
        videoPlayer.src = defaultUrl;
        videoUrlInput.value = defaultUrl;
      }
    });
  }
  async function saveVideoUrl(url) {
    const statusMessage = document.getElementById('status-message');
    try {
      await setDoc(doc(db, videoDocPath), { url });
      statusMessage.textContent = "Video URL saved!";
      statusMessage.classList.add('text-green-600');
    } catch (err) {
      statusMessage.textContent = "Error: " + err.message;
      statusMessage.classList.add('text-red-600');
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    // ✅ Mobile Menu Toggle FIX
    const mobileMenuBtn = document.getElementById("mobile-menu-button");
    const mobileMenu = document.getElementById("mobile-menu");
    if (mobileMenuBtn && mobileMenu) {
      mobileMenuBtn.addEventListener("click", () => {
        mobileMenu.classList.toggle("hidden");
        if (mobileMenu.classList.contains("hidden")) {
          mobileMenuBtn.innerHTML = `<svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>`;
        } else {
          mobileMenuBtn.innerHTML = `<svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>`;
        }
      });
      mobileMenu.querySelectorAll("a").forEach(link => {
        link.addEventListener("click", () => {
          mobileMenu.classList.add("hidden");
          mobileMenuBtn.innerHTML = `<svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/></svg>`;
        });
      });
    }

    // --- Your modal, save button, testimonial slider etc. remain unchanged here ---
    signIn();
  });
</script>

</body>
</html>
